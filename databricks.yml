bundle:
  name: adventureworks-databricks-medallion-dbt

include:
  - resources/*.job.yml

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: dev
  prod:
    mode: production
    workspace:
      profile: prod
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
