name: Databricks Bundle CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"

jobs:
  # --------------------------------------------------
  # 1. VALIDATION (always runs)
  # --------------------------------------------------
  validate:
    name: Validate Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@v1.4.0

      # The bundle's dev target uses `profile: dev`, so the CLI needs a
      # matching [dev] profile in ~/.databrickscfg. Write it from secrets.
      - name: Write dev profile
        run: |
          umask 077
          printf '[dev]\nhost = %s\ntoken = %s\n' \
            '${{ secrets.DATABRICKS_HOST_DEV }}' \
            '${{ secrets.DATABRICKS_TOKEN_DEV }}' > ~/.databrickscfg

      - name: Validate bundle
        run: databricks bundle validate -t dev

  # --------------------------------------------------
  # 2. DEV DEPLOY (feature / bugfix / hotfix)
  # --------------------------------------------------
  dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: validate
    if: >
      github.event_name == 'push' && (
        startsWith(github.ref, 'refs/heads/feature/') ||
        startsWith(github.ref, 'refs/heads/bugfix/')  ||
        startsWith(github.ref, 'refs/heads/hotfix/'))
    steps:
      - uses: actions/checkout@v7

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@v1.4.0

      - name: Write dev profile
        run: |
          umask 077
          printf '[dev]\nhost = %s\ntoken = %s\n' \
            '${{ secrets.DATABRICKS_HOST_DEV }}' \
            '${{ secrets.DATABRICKS_TOKEN_DEV }}' > ~/.databrickscfg

      - name: Deploy to Dev
        run: databricks bundle deploy -t dev

  # --------------------------------------------------
  # 3. PROD DEPLOY (main only)
  # --------------------------------------------------
  prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production # 🔒 approval gate required
    steps:
      - uses: actions/checkout@v7

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@v1.4.0

      # The bundle's prod target uses `profile: prod`, so write a matching
      # [prod] profile from the prod secrets.
      - name: Write prod profile
        run: |
          umask 077
          printf '[prod]\nhost = %s\ntoken = %s\n' \
            '${{ secrets.DATABRICKS_HOST_PROD }}' \
            '${{ secrets.DATABRICKS_TOKEN_PROD }}' > ~/.databrickscfg

      - name: Deploy to Prod
        run: databricks bundle deploy -t prod