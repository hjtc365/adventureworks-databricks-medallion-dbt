version: 2

models:
  - name: mart_sales_summary
    description: "Sales aggregated by territory + product category + month. BI-ready."
    columns:
      - name: gross_revenue
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: net_revenue
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: order_count
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
      - name: units_sold
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
      - name: month_number
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 12
      - name: quarter_number
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 4
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - year_number
            - month_number
            - territory_name
            - category_name
            - subcategory_name
      - dbt_utils.expression_is_true:
          expression: "net_revenue >= gross_revenue"
