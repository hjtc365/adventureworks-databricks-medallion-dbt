version: 2

models:
  - name: dim_customer
    description: |
      Type 1 customer dimension (current state). Unifies Individual and Store
      customers; `customer_name` is a coalesced label and `customer_type`
      distinguishes the two sub-types. Address columns are prefixed `current_`
      to make the Type 1 semantics explicit. Territory is intentionally NOT
      carried here — it is resolved at order time via dim_salesterritory on
      the fact, which avoids ambiguous "territory" filters in BI tools.
      Includes a synthetic Unknown member (customer_sk = '-1') so fact FKs
      never dangle.
    columns:
      - name: customer_sk
        tests: [not_null, unique]
      - name: customer_bk
        tests: [not_null, unique]
      - name: account_number
        description: "Customer account number ('AW' + zero-padded ID). Null only for the Unknown member."
        tests:
          - not_null:
              config:
                where: "is_unknown = false"
          - unique:
              config:
                where: "is_unknown = false"
      - name: customer_type
        tests:
          - accepted_values:
              arguments:
                values: ['Individual', 'Store', 'StoreContact', 'Unknown']
      - name: customer_name
        tests: [not_null]
      - name: is_unknown
        tests: [not_null]
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "customer_bk is not null or is_unknown = true"

  - name: dim_product
    description: |
      SCD2 product dimension with rolled-up category/subcategory.
      Includes a conformed Unknown member (product_sk = '-1', is_unknown = true,
      valid_from = '1900-01-01', valid_to = NULL) so fact FKs never dangle and
      the point-in-time predicate always finds it.
    tests:
      - test_scd2_no_date_overlap:
          arguments:
            business_key: product_bk
            valid_from: valid_from
            valid_to: valid_to
    columns:
      - name: product_sk
        tests: [not_null, unique]
      - name: product_bk
        tests: [not_null]
      - name: valid_from
        tests: [not_null]
      - name: product_name
        tests:
          - not_null:
              config:
                where: "is_unknown = false"
      - name: product_number
        tests:
          - not_null:
              config:
                where: "is_unknown = false"
          - unique:
              config:
                where: "is_unknown = false"
      - name: is_current
        tests: [not_null]
      - name: product_status
        tests:
          - accepted_values:
              arguments:
                values: ["Active", "Inactive", "Discontinued"]
              config:
                where: "is_unknown = false"
      - name: list_price
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                row_condition: "is_unknown = false"
      - name: standard_cost
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                row_condition: "is_unknown = false"
      - name: is_unknown
        tests: [not_null]

  - name: dim_employee
    description: |
      SCD2 employee dimension. Includes a conformed Unknown member
      (employee_sk = '-1', is_unknown = true) used by sales-line FKs when
      no rep is assigned.
    tests:
      - test_scd2_no_date_overlap:
          arguments:
            business_key: employee_bk
            valid_from: valid_from
            valid_to: valid_to
    columns:
      - name: employee_sk
        tests: [not_null, unique]
      - name: employee_bk
        tests: [not_null]
      - name: valid_from
        tests: [not_null]
      - name: is_current_version
        tests: [not_null]
      - name: login_id
        tests:
          - not_null:
              config:
                where: "is_unknown = false"
      - name: job_title
        tests:
          - not_null:
              config:
                where: "is_unknown = false"
      - name: hire_date
        tests:
          - not_null:
              config:
                where: "is_unknown = false"
      - name: is_unknown
        tests: [not_null]

  - name: dim_salesterritory
    description: |
      SCD2 sales territory dimension. Includes a conformed Unknown member
      (sales_territory_sk = '-1', is_unknown = true).
    tests:
      - test_scd2_no_date_overlap:
          arguments:
            business_key: sales_territory_bk
            valid_from: valid_from
            valid_to: valid_to
    columns:
      - name: sales_territory_sk
        tests: [not_null, unique]
      - name: sales_territory_bk
        tests: [not_null]
      - name: valid_from
        tests: [not_null]
      - name: is_current
        tests: [not_null]
      - name: territory_name
        tests: [not_null]
      - name: country_region_code
        tests:
          - not_null:
              config:
                where: "is_unknown = false"
      - name: territory_group
        tests:
          - not_null:
              config:
                where: "is_unknown = false"
      - name: is_unknown
        tests: [not_null]

  - name: dim_date
    description: |
      Conformed date dimension, range derived dynamically from sales orders.
      Includes a conformed Unknown member (date_sk = -1, is_unknown = true)
      so fact date FKs are never NULL when an upstream date is missing.
    columns:
      - name: date_sk
        tests: [not_null, unique]
      - name: full_date
        tests:
          - unique
          # full_date is NULL only on the Unknown member (date_sk = -1).
          - not_null:
              config:
                where: "date_sk <> -1"
      - name: year_number
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1990
                max_value: 2030
                row_condition: "is_unknown = false"
      - name: month_number
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 12
                row_condition: "is_unknown = false"
      - name: day_of_month
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 31
                row_condition: "is_unknown = false"
      - name: quarter_number
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 4
                row_condition: "is_unknown = false"
      - name: day_of_week
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 7
                row_condition: "is_unknown = false"
      - name: is_weekend
        tests:
          - not_null:
              config:
                where: "is_unknown = false"
      - name: fiscal_quarter
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 4
                row_condition: "is_unknown = false"
      - name: is_unknown
        tests: [not_null]

  - name: dim_special_offer
    description: |
      Promotion / discount dimension (NOT a junk dim — it has its own attributes
      and discount_pct drives revenue measures). Includes a conformed Unknown
      member (special_offer_sk = '-1', is_unknown = true).
    columns:
      - name: special_offer_sk
        tests: [not_null, unique]
      - name: special_offer_bk
        tests: [not_null]
      - name: offer_description
        tests:
          - not_null:
              config:
                where: "is_unknown = false"
      - name: offer_type
        tests:
          - not_null:
              config:
                where: "is_unknown = false"
      - name: offer_category
        tests:
          - not_null:
              config:
                where: "is_unknown = false"
      - name: eligible_product_count
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: is_active
        tests: [not_null]
      - name: discount_pct
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 1
      - name: discount_tier
        tests:
          - accepted_values:
              arguments:
                values: ['No Discount', 'Low (<5%)', 'Medium (5-15%)', 'High (15-30%)', 'Deep (30%+)']
      - name: is_unknown
        tests: [not_null]

  - name: dim_sales_order_junk
    description: |
      Junk dim collapsing 5 low-cardinality order flags into a single SK.
      Includes a conformed Unknown member (sales_order_junk_sk = '-1',
      is_unknown = true) for outer-join misses.
    columns:
      - name: sales_order_junk_sk
        tests: [not_null, unique]
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["In process", "Approved", "Backordered", "Rejected", "Shipped", "Cancelled", "Unknown"]
      - name: revision_number
        tests:
          - not_null:
              config:
                where: "is_unknown = false"
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                row_condition: "is_unknown = false"
      - name: is_unknown
        tests: [not_null]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_status
              - is_online_order
              - revision_number
              - ship_method_name
              - card_type
