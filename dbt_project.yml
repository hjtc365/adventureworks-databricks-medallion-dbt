# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: 'adventureworks'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'adventureworks'

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"


# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models
models:
  adventureworks:
    +file_format: delta
    +persist_docs:
      relation: true
      columns: true
    # Config indicated by + and applies to all files under models/bronze/
    silver:
      +schema: silver
      staging:
        +materialized: view
        # Two staging models are incremental — overridden in their own configs:
        # stg_sales_order_header, stg_sales_order_detail
      intermediate:
        +materialized: view
    gold:
      +schema: gold
      dimensions:
        +materialized: table
      facts:
        +materialized: incremental
        +incremental_strategy: merge
        +on_schema_change: append_new_columns
      marts:
        +materialized: table

snapshots:
  adventureworks:
    +schema: gold
    +file_format: delta
    +strategy: check
    +hard_deletes: invalidate

# Pipeline observability hooks
on-run-start:
  - "{{ log('Starting dbt run for AdventureWorks Lakehouse — target: ' ~ target.name, info=true) }}"

on-run-end:
  - "{{ log('Finished dbt run — invocation: ' ~ invocation_id, info=true) }}"